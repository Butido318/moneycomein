<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONEYCOMEIN | 資產管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --pearl-white: #FDFDFD; --soft-gray: #F4F4F4; --matte-gold: #C5A059; --champagne: #E2C275; --text-dark: #4A4A4A; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--soft-gray); color: var(--text-dark); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--champagne); margin-bottom: 20px; }
        h1 { color: var(--matte-gold); letter-spacing: 2px; margin: 0; }
        .card { background: var(--pearl-white); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 20px; border-top: 4px solid var(--matte-gold); }
        .dashboard { background: linear-gradient(135deg, #4A4A4A, #2D2D2D); color: white; border-top: none; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .full-width { grid-column: span 2; }
        label { font-size: 0.8rem; color: #888; margin-bottom: 4px; display: block; }
        .dash-label { color: #AAA; }
        .val { font-size: 1.2rem; font-weight: bold; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        input, select { padding: 10px; border: 1px solid #DDD; border-radius: 6px; }
        button { background: linear-gradient(135deg, var(--champagne), var(--matte-gold)); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:disabled { background: #999; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>MONEYCOMEIN</h1></header>

    <div class="card dashboard">
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #555; padding-bottom: 10px; margin-bottom: 15px;">
            <span style="color: var(--champagne); font-weight: bold;">資產概況</span>
            <span id="lastUpdateDate" style="font-size: 0.8rem; color: #AAA;">載入中...</span>
        </div>
        <div class="grid">
            <div><label class="dash-label">帳戶存款</label><div id="dispDeposit" class="val">$0</div></div>
            <div><label class="dash-label">股票市值</label><div id="dispMarket" class="val">$0</div></div>
            <div><label class="dash-label">總資產</label><div id="dispTotal" class="val" style="color: var(--champagne); font-size: 1.4rem;">$0</div></div>
            <div><label class="dash-label">投入成本</label><div id="dispCost" class="val">$0</div></div>
            <div class="full-width" style="border-top: 1px solid #555; padding-top: 10px; display: flex; justify-content: space-around;">
                <div style="text-align: center;"><label class="dash-label">總盈餘</label><div id="dispProfit" style="font-size: 1.5rem; font-weight: bold;">$0</div></div>
                <div style="text-align: center;"><label class="dash-label">報酬率</label><div id="dispROI" style="font-size: 1.5rem; font-weight: bold;">0%</div></div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="grid">
            <div class="form-group"><label>日期</label><input type="date" id="accDate"></div>
            <div class="form-group"><label>金額</label><input type="number" id="accAmount"></div>
            <div class="full-width"><input type="text" id="accNote" placeholder="備註"></div>
        </div>
        <button id="btnAccount" onclick="submitAccount()">提交存入</button>
    </div>

    <div class="card">
        <div class="grid">
            <div class="form-group"><label>日期</label><input type="date" id="tradeDate"></div>
            <div class="form-group"><label>類型</label><select id="tradeType"><option value="進">進貨</option><option value="出">出倉</option></select></div>
            <div class="form-group"><label>代碼</label><input type="text" id="tradeCode"></div>
            <div class="form-group"><label>名稱</label><input type="text" id="tradeName" list="stockOptions"><datalist id="stockOptions"></datalist></div>
            <div class="form-group"><label>數量</label><input type="number" id="tradeQty"></div>
            <div class="form-group"><label>單價</label><input type="number" id="tradePrice"></div>
        </div>
        <button id="btnTrade" onclick="submitTrade()">儲存交易</button>
    </div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwtq6jzwqTOyAPK4LVaHNj3Wrad_03tKgZWDI01NP8G8pLiXD4hNbeEG7BnTzp2ykNfag/exec'; // <--- 請修改這裡
    let localProductList = [];
    let isSubmitting = false;

    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.querySelectorAll('input[type="date"]').forEach(i => i.value = today);
        fetchProductList();
        fetchLastProfit();
    };

    function fetchLastProfit() {
        fetch(GAS_URL + "?action=getLastProfit").then(r => r.json()).then(data => {
            if (!data.date) return;
            document.getElementById('lastUpdateDate').innerText = '最後更新: ' + data.date;
            document.getElementById('dispDeposit').innerText = '$' + Number(data.deposit).toLocaleString();
            document.getElementById('dispMarket').innerText = '$' + Number(data.marketValue).toLocaleString();
            document.getElementById('dispTotal').innerText = '$' + Number(data.totalAssets).toLocaleString();
            document.getElementById('dispCost').innerText = '$' + Number(data.cost).toLocaleString();
            const pVal = Number(data.profit);
            document.getElementById('dispProfit').innerText = '$' + pVal.toLocaleString();
            document.getElementById('dispROI').innerText = data.roi;
            const color = pVal >= 0 ? '#E2C275' : '#FF6B6B';
            document.getElementById('dispProfit').style.color = color;
            document.getElementById('dispROI').style.color = color;
        });
    }

    function fetchProductList() {
        fetch(GAS_URL + "?action=getProductList").then(r => r.json()).then(data => {
            localProductList = data;
            const dl = document.getElementById('stockOptions');
            dl.innerHTML = "";
            data.forEach(i => { let opt = document.createElement('option'); opt.value = i.name; opt.label = i.code; dl.appendChild(opt); });
        });
    }

    document.getElementById('tradeCode').oninput = function() {
        const f = localProductList.find(i => i.code.toString() === this.value.trim());
        if (f) document.getElementById('tradeName').value = f.name;
    };
    document.getElementById('tradeName').oninput = function() {
        const f = localProductList.find(i => i.name === this.value.trim());
        if (f) document.getElementById('tradeCode').value = f.code;
    };

    function submitAccount() {
        const payload = { action: "addAccountLog", data: { date: document.getElementById('accDate').value, amount: document.getElementById('accAmount').value, note: document.getElementById('accNote').value }};
        sendToGas(payload, 'btnAccount');
    }

    function submitTrade() {
        const qty = Number(document.getElementById('tradeQty').value);
        const price = Number(document.getElementById('tradePrice').value);
        const type = document.getElementById('tradeType').value;
        const payload = { action: "addTransaction", data: { 
            date: document.getElementById('tradeDate').value, type: type, code: document.getElementById('tradeCode').value,
            name: document.getElementById('tradeName').value, qty: qty, price: price, fee: 0, 
            total: (type === "進") ? (qty * price) : (qty * price) 
        }};
        sendToGas(payload, 'btnTrade');
    }

    function sendToGas(p, id) {
        if (isSubmitting) return;
        isSubmitting = true;
        const b = document.getElementById(id);
        const t = b.innerText; b.innerText = '處理中...'; b.disabled = true;
        fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) }).then(() => {
            alert('成功！'); resetForm(p.action); fetchLastProfit();
        }).finally(() => { b.innerText = t; b.disabled = false; isSubmitting = false; });
    }

    function resetForm(a) {
        const d = new Date().toISOString().split('T')[0];
        if (a === "addAccountLog") { document.getElementById('accAmount').value = ''; document.getElementById('accDate').value = d; }
        else { ['tradeCode','tradeName','tradeQty','tradePrice'].forEach(id => document.getElementById(id).value = ''); document.getElementById('tradeDate').value = d; }
    }
</script>
</body>
</html>
