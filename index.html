<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONEYCOMEIN | 資產管理系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --pearl-white: #FDFDFD; --soft-gray: #F4F4F4; --matte-gold: #C5A059; --champagne: #E2C275; --text-dark: #4A4A4A; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--soft-gray); color: var(--text-dark); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--champagne); margin-bottom: 20px; }
        h1 { color: var(--matte-gold); letter-spacing: 2px; margin: 0; }
        .card { background: var(--pearl-white); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 20px; border-top: 4px solid var(--matte-gold); }
        .dashboard { background: linear-gradient(135deg, #4A4A4A, #2D2D2D); color: white; border-top: none; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .full-width { grid-column: span 2; }
        label { font-size: 0.8rem; color: #888; margin-bottom: 4px; display: block; }
        .dash-label { color: #AAA; }
        .val { font-size: 1.2rem; font-weight: bold; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        input, select { padding: 12px; border: 1px solid #DDD; border-radius: 8px; outline: none; font-size: 1rem; }
        button { background: linear-gradient(135deg, var(--champagne), var(--matte-gold)); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; font-size: 1rem; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .section-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; color: var(--matte-gold); display: flex; align-items: center; }
        .section-title::before { content: ""; width: 4px; height: 18px; background: var(--champagne); margin-right: 8px; border-radius: 2px; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>MONEYCOMEIN</h1></header>

    <div class="card dashboard">
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #555; padding-bottom: 10px; margin-bottom: 15px;">
            <span style="color: var(--champagne); font-weight: bold; letter-spacing: 1px;">最新資產概況</span>
            <span id="lastUpdateDate" style="font-size: 0.8rem; color: #AAA;">最後同步: --</span>
        </div>
        <div class="grid">
            <div><label class="dash-label">帳戶存款</label><div id="dispDeposit" class="val">$0</div></div>
            <div><label class="dash-label">股票市值</label><div id="dispMarket" class="val">$0</div></div>
            <div><label class="dash-label">總資產</label><div id="dispTotal" class="val" style="color: var(--champagne); font-size: 1.5rem;">$0</div></div>
            <div><label class="dash-label">投入成本</label><div id="dispCost" class="val">$0</div></div>
            <div class="full-width" style="border-top: 1px solid #555; padding-top: 15px; display: flex; justify-content: space-around; margin-top: 5px;">
                <div style="text-align: center;"><label class="dash-label">總盈餘</label><div id="dispProfit" style="font-size: 1.6rem; font-weight: bold;">$0</div></div>
                <div style="text-align: center;"><label class="dash-label">報酬率</label><div id="dispROI" style="font-size: 1.6rem; font-weight: bold;">0.00%</div></div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">帳戶存入紀錄</div>
        <div class="grid">
            <div class="form-group"><label>日期</label><input type="date" id="accDate"></div>
            <div class="form-group"><label>存入金額</label><input type="number" id="accAmount" placeholder="輸入金額"></div>
            <div class="full-width"><label>備註</label><input type="text" id="accNote" placeholder="例如：5月薪資存入"></div>
        </div>
        <button id="btnAccount" onclick="submitAccount()">確認提交存入</button>
    </div>

    <div class="card">
        <div class="section-title">股票交易登記</div>
        <div class="grid">
            <div class="form-group"><label>交易日期</label><input type="date" id="tradeDate"></div>
            <div class="form-group"><label>交易類型</label>
                <select id="tradeType">
                    <option value="進">買進 (0.1425%)</option>
                    <option value="出">賣出 (0.4425%)</option>
                </select>
            </div>
            <div class="form-group"><label>股票代碼</label><input type="text" id="tradeCode" placeholder="2330"></div>
            <div class="form-group">
                <label>股票名稱</label>
                <input type="text" id="tradeName" list="stockOptions">
                <datalist id="stockOptions"></datalist>
            </div>
            <div class="form-group"><label>成交數量</label><input type="number" id="tradeQty"></div>
            <div class="form-group"><label>成交單價</label><input type="number" id="tradePrice"></div>
            <div class="form-group full-width"><label>預估費用</label><input type="number" id="tradeFee" readonly style="background:#f0f0f0;"></div>
        </div>
        <button id="btnTrade" onclick="submitTrade()">儲存交易明細</button>
    </div>
</div>

<script>
    // 【重要：請務必更換為您的最新 GAS 部署網址】
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwtq6jzwqTOyAPK4LVaHNj3Wrad_03tKgZWDI01NP8G8pLiXD4hNbeEG7BnTzp2ykNfag/exec'; 
    
    let localProductList = [];

    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('accDate').value = today;
        document.getElementById('tradeDate').value = today;
        fetchProductList();
        fetchLastProfit();
    };

    function fetchLastProfit() {
        fetch(GAS_URL + "?action=getLastProfit").then(res => res.json()).then(data => {
            if (!data.date) return;
            document.getElementById('lastUpdateDate').innerText = '最後同步: ' + data.date;
            document.getElementById('dispDeposit').innerText = '$' + Number(data.deposit).toLocaleString();
            document.getElementById('dispMarket').innerText = '$' + Number(data.marketValue).toLocaleString();
            document.getElementById('dispTotal').innerText = '$' + Number(data.totalAssets).toLocaleString();
            document.getElementById('dispCost').innerText = '$' + Number(data.cost).toLocaleString();
            const profit = Number(data.profit);
            document.getElementById('dispProfit').innerText = '$' + profit.toLocaleString();
            document.getElementById('dispROI').innerText = data.roi;
            const color = profit >= 0 ? '#E2C275' : '#FF6B6B';
            document.getElementById('dispProfit').style.color = color;
            document.getElementById('dispROI').style.color = color;
        });
    }

    function fetchProductList() {
        fetch(GAS_URL + "?action=getProductList").then(res => res.json()).then(data => {
            localProductList = data;
            const datalist = document.getElementById('stockOptions');
            datalist.innerHTML = "";
            data.forEach(item => {
                let option = document.createElement('option');
                option.value = item.name;
                option.label = item.code;
                datalist.appendChild(option);
            });
        });
    }

    // 自動聯動代碼與名稱
    document.getElementById('tradeCode').addEventListener('input', function() {
        const found = localProductList.find(i => i.code === this.value.trim());
        if (found) document.getElementById('tradeName').value = found.name;
    });

    // 自動計算手續費
    function calculatePreview() {
        const qty = Number(document.getElementById('tradeQty').value);
        const price = Number(document.getElementById('tradePrice').value);
        const type = document.getElementById('tradeType').value;
        if (qty && price) {
            const amount = qty * price;
            let fee = (type === "進") ? Math.max(20, Math.floor(amount * 0.001425)) : Math.max(20, Math.floor(amount * 0.004425));
            document.getElementById('tradeFee').value = fee;
        }
    }
    document.getElementById('tradeQty').addEventListener('input', calculatePreview);
    document.getElementById('tradePrice').addEventListener('input', calculatePreview);
    document.getElementById('tradeType').addEventListener('change', calculatePreview);

    function submitAccount() {
        sendToGas({
            action: "addAccountLog",
            data: { date: document.getElementById('accDate').value, amount: document.getElementById('accAmount').value, note: document.getElementById('accNote').value }
        }, 'btnAccount');
    }

    function submitTrade() {
        sendToGas({
            action: "addTransaction",
            data: {
                date: document.getElementById('tradeDate').value,
                type: document.getElementById('tradeType').value,
                code: document.getElementById('tradeCode').value,
                name: document.getElementById('tradeName').value,
                qty: document.getElementById('tradeQty').value,
                price: document.getElementById('tradePrice').value
            }
        }, 'btnTrade');
    }

    function sendToGas(payload, btnId) {
        const btn = document.getElementById(btnId);
        btn.innerText = '處理中...';
        btn.disabled = true;
        fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => {
            alert('送出成功！');
            location.reload();
        });
    }
</script>
</body>
</html>
